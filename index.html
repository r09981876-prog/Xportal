<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kraken Wallet - Secure Import</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: #000; overflow: hidden; }
        
        .app-container { width: 100%; height: 100%; max-width: 430px; margin: 0 auto; position: relative; overflow: hidden; }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #1a0a3e 0%, #0f0620 30%, #1a0a3e 70%, #0d0520 100%);
            display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1;
        }

        .screen::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(139, 92, 246, 0.5) 0%, transparent 50%),
                        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(168, 85, 247, 0.3) 0%, transparent 40%);
            pointer-events: none;
        }

        #mainScreen { transform: translateX(0); z-index: 2; }
        #importScreen { transform: translateX(100%); z-index: 3; }
        .show-import #mainScreen { transform: translateX(-100%); }
        .show-import #importScreen { transform: translateX(0); }

        /* شاشة البداية */
        .icon-1 { position: absolute; top: 44px; left: 20px; width: 28px; height: 28px; z-index: 100; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 120px; z-index: 10; }
        .headline { text-align: center; margin-bottom: 40px; }
        .headline-1 { font-size: 42px; font-weight: 700; color: #7c3aed; }
        .headline-2 { font-size: 42px; font-weight: 700; color: #ffffff; }
        .actions { display: flex; gap: 12px; padding: 0 20px 40px; z-index: 100; }
        .btn { flex: 1; height: 56px; border-radius: 28px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; }
        .btn-import { background: rgba(255, 255, 255, 0.1); color: #fff; backdrop-filter: blur(10px); }
        .btn-create { background: #7c3aed; color: #fff; }

        /* شاشة الاستيراد */
        .header { padding: 44px 20px 20px; display: flex; align-items: center; gap: 12px; z-index: 100; }
        .back-btn { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer; }
        .import-content { flex: 1; display: flex; flex-direction: column; padding: 0 20px; z-index: 10; overflow-y: auto; }
        .seed-input-wrapper { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; padding: 16px; margin-bottom: 20px; transition: 0.3s;
        }
        .seed-input-wrapper.error { border-color: #ef4444; }
        .seed-input-wrapper.success { border-color: #22c55e; }
        .seed-textarea { 
            width: 100%; min-height: 100px; background: transparent; border: none; 
            outline: none; color: #ffffff; font-size: 16px; font-family: monospace; resize: none;
        }
        .word-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .word-tag { padding: 6px 12px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .tag-valid { background: rgba(124, 58, 237, 0.2); color: #fff; border: 1px solid rgba(124, 58, 237, 0.4); }
        .tag-invalid { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.4); }

        .stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat { flex: 1; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 20px; font-weight: 700; color: #fff; }
        .stat-lbl { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }

        .import-btn { 
            width: 100%; height: 56px; background: #7c3aed; border: none; border-radius: 28px; 
            color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 40px; transition: 0.3s;
        }
        .import-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        @media (min-width: 431px) {
            body { display: flex; align-items: center; justify-content: center; background: #000; }
            .app-container { height: 90vh; max-height: 900px; border-radius: 30px; border: 1px solid #333; }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="screen" id="mainScreen">
        <div class="icon-1"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'%3E%3Cpath fill='%237c3aed' d='M14 2C7.3 2 2 7.3 2 14s5.3 12 12 12 12-5.3 12-12S20.7 2 14 2z'/%3E%3C/svg%3E"></div>
        <div class="main-content">
            <div class="headline"><div class="headline-1">One wallet.</div><div class="headline-2">Many chains.</div></div>
            <div style="width:280px; height:280px; background: rgba(124,58,237,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 80px;">💎</span>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-import" onclick="openImport()">Import</button>
            <button class="btn btn-create">Create wallet</button>
        </div>
    </div>

    <div class="screen" id="importScreen">
        <div class="header">
            <button class="back-btn" onclick="closeImport()">✕</button>
            <span class="header-title">Secret Recovery Phrase</span>
        </div>
        <div class="import-content">
            <p style="color:rgba(255,255,255,0.6); margin-bottom: 20px; font-size: 14px;">Enter your 12 or 24 words. Each word must be a valid BIP39 word.</p>
            
            <div class="seed-input-wrapper" id="wrapper">
                <textarea class="seed-textarea" id="input" placeholder="Enter words separated by spaces..."></textarea>
                <div class="word-tags" id="tags"></div>
            </div>

            <div class="stats">
                <div class="stat"><div class="stat-val" id="count">0</div><div class="stat-lbl">WORDS</div></div>
                <div class="stat"><div class="stat-val" id="validCount">0</div><div class="stat-lbl">VALID</div></div>
                <div class="stat"><div class="stat-val" id="status">...</div><div class="stat-lbl">STATUS</div></div>
            </div>

            <button class="import-btn" id="submit" disabled onclick="alert('Success!')">Import Wallet</button>
        </div>
    </div>
</div>

<script>

function openImport() { document.getElementById('app').classList.add('show-import'); }
function closeImport() { document.getElementById('app').classList.remove('show-import'); }

const input = document.getElementById('input');
const tags = document.getElementById('tags');
const btn = document.getElementById('submit');

input.addEventListener('input', () => {
    const rawWords = input.value.trim().split(/\s+/).filter(w => w.length > 0);
    let validCount = 0;
    let allExist = true;

    tags.innerHTML = rawWords.map((w, i) => {
        const word = w.toLowerCase();
        const exists = BIP39.includes(word);
        if (exists) validCount++;
        else allExist = false;
        
        return `<div class="word-tag ${exists ? 'tag-valid' : 'tag-invalid'}">
            ${i+1}. ${word} ${exists ? '✓' : '✕'}
        </div>`;
    }).join('');

    document.getElementById('count').textContent = rawWords.length;
    document.getElementById('validCount').textContent = validCount;
    
    const isPerfect = (rawWords.length === 12 || rawWords.length === 24) && allExist;
    
    document.getElementById('status').textContent = isPerfect ? 'READY' : '...';
    document.getElementById('status').style.color = isPerfect ? '#22c55e' : '#fff';
    document.getElementById('wrapper').className = `seed-input-wrapper ${rawWords.length > 0 ? (allExist ? 'success' : 'error') : ''}`;
    
    btn.disabled = !isPerfect;
});
</script>
</body>
</html>
