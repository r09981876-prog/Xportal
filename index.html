<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kraken Wallet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
        }
        
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a0a3e 0%, #0f0620 30%, #1a0a3e 70%, #0d0520 100%);
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 10%, rgba(139, 92, 246, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(168, 85, 247, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse 50% 30% at 50% 80%, rgba(139, 92, 246, 0.2) 0%, transparent 40%);
            pointer-events: none;
        }

        #mainScreen { transform: translateX(0); z-index: 2; }
        #importScreen { transform: translateX(100%); z-index: 3; }
        
        .show-import #mainScreen { transform: translateX(-100%); }
        .show-import #importScreen { transform: translateX(0); }

        /* الشاشة الرئيسية */
        .icon-1 { position: absolute; top: 44px; left: 20px; width: 28px; height: 28px; z-index: 100; }
        .icon-1 img { width: 100%; height: 100%; object-fit: contain; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 120px; z-index: 10; }
        .headline { text-align: center; margin-bottom: 40px; }
        .headline-1 { font-size: 42px; font-weight: 700; color: #7c3aed; line-height: 1.15; }
        .headline-2 { font-size: 42px; font-weight: 700; color: #ffffff; line-height: 1.15; }
        .icon-2-wrapper { width: 300px; height: 300px; }
        .icon-2 img { width: 100%; height: 100%; object-fit: contain; }
        .actions { display: flex; gap: 12px; padding: 0 20px 40px; z-index: 100; }
        .btn { flex: 1; height: 54px; border-radius: 27px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        .btn-import { background: rgba(255, 255, 255, 0.12); color: #ffffff; backdrop-filter: blur(20px); }
        .btn-create { background: #7c3aed; color: #ffffff; box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4); }

        /* شاشة الاستيراد */
        .header { padding: 44px 20px 20px; display: flex; align-items: center; gap: 12px; z-index: 100; }
        .back-btn { width: 40px; height: 40px; border-radius: 12px; background: rgba(255, 255, 255, 0.08); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
        .header-title { font-size: 17px; font-weight: 600; color: #ffffff; }
        .import-content { flex: 1; display: flex; flex-direction: column; padding: 0 20px; overflow-y: auto; z-index: 10; }
        .title-section { margin-bottom: 24px; }
        .main-title { font-size: 28px; font-weight: 700; color: #ffffff; margin-bottom: 8px; }
        .subtitle { font-size: 15px; color: rgba(255, 255, 255, 0.6); }
        .seed-input-wrapper { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 16px; min-height: 160px; margin-bottom: 20px; }
        .seed-input-wrapper.success { border-color: #22c55e; background: rgba(34, 197, 94, 0.05); }
        .seed-textarea { width: 100%; min-height: 80px; background: transparent; border: none; outline: none; color: #ffffff; font-size: 16px; font-family: monospace; resize: none; }
        .word-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .word-tag { padding: 6px 12px; background: rgba(124, 58, 237, 0.2); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 8px; font-size: 14px; color: #ffffff; }
        .stats { display: flex; gap: 16px; margin-bottom: 20px; }
        .stat { flex: 1; background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: 700; color: #ffffff; }
        .stat-label { font-size: 12px; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; }
        .import-btn { width: 100%; height: 56px; background: #7c3aed; border: none; border-radius: 28px; color: #ffffff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: auto; margin-bottom: 40px; transition: 0.3s; }
        .import-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (min-width: 431px) {
            body { display: flex; align-items: center; justify-content: center; background: #0a0a0a; }
            .app-container { height: 90vh; max-height: 932px; border-radius: 40px; box-shadow: 0 0 60px rgba(124, 58, 237, 0.2); }
            .screen { border-radius: 40px; }
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <div class="screen" id="mainScreen">
        <div class="icon-1">
            <img src="icon1.png" alt="Kraken" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 28 28%22%3E%3Cpath fill=%22%237c3aed%22 d=%22M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2zm0 3.5c1.2 0 2 0.8 2 2s-0.8 2-2 2-2-0.8-2-2 0.8-2 2-2zm-5 4c1.2 0 2 0.8 2 2s-0.8 2-2 2-2-0.8-2-2 0.8-2 2-2zm10 0c1.2 0 2 0.8 2 2s-0.8 2-2 2-2-0.8-2-2 0.8-2 2-2zm-7.5 5c1.2 0 2 0.8 2 2s-0.8 2-2 2-2-0.8-2-2 0.8-2 2-2zm5 0c1.2 0 2 0.8 2 2s-0.8 2-2 2-2-0.8-2-2 0.8-2 2-2z%22/%3E%3C/svg%3E'">
        </div>
        <div class="main-content">
            <div class="headline">
                <div class="headline-1">One wallet.</div>
                <div class="headline-2">Many chains.</div>
            </div>
            <div class="icon-2-wrapper">
                <img src="icon2.png" alt="Crypto" style="width:100%;height:100%;object-fit:contain;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 300 300%22%3E%3Cdefs%3E%3ClinearGradient id=%22g%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22%3E%3Cstop offset=%220%25%22 stop-color=%22%238b5cf6%22/%3E%3Cstop offset=%22100%25%22 stop-color=%22%23a855f7%22/%3E%3C/linearGradient%3E%3C/defs%3E%3Cellipse cx=%22150%22 cy=%22150%22 rx=%22140%22 ry=%22140%22 fill=%22none%22 stroke=%22url%28%23g%29%22 stroke-width=%223%22 opacity=%220.3%22/%3E%3Crect x=%22120%22 y=%2280%22 width=%2260%22 height=%2260%22 rx=%2212%22 fill=%22%23e8e8e8%22/%3E%3Crect x=%2280%22 y=%22150%22 width=%2255%22 height=%2255%22 rx=%2212%22 fill=%22%2300d4aa%22/%3E%3Crect x=%22165%22 y=%22155%22 width=%2250%22 height=%2250%22 rx=%2212%22 fill=%22%23f7931a%22/%3E%3C/svg%3E'">
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-import" onclick="openImport()">Import</button>
            <button class="btn btn-create">Create wallet</button>
        </div>
    </div>

    <div class="screen" id="importScreen">
        <div class="header">
            <button class="back-btn" onclick="closeImport()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span class="header-title">Import Wallet</span>
        </div>
        <div class="import-content">
            <div class="title-section">
                <h1 class="main-title">Recovery phrase</h1>
                <p class="subtitle">Enter your 12 or 24-word recovery phrase to restore your wallet.</p>
            </div>
            <div class="seed-input-wrapper" id="inputWrapper">
                <textarea class="seed-textarea" id="seedInput" placeholder="Enter words here..."></textarea>
                <div class="word-tags" id="wordTags"></div>
            </div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="wordCount">0</div><div class="stat-label">Words</div></div>
                <div class="stat"><div class="stat-value" id="statusIcon">—</div><div class="stat-label">Status</div></div>
            </div>
            <button class="import-btn" id="importBtn" disabled onclick="alert('Wallet Imported!')">Import Wallet</button>
        </div>
    </div>
</div>

<script>
    function openImport() { document.getElementById('appContainer').classList.add('show-import'); }
    function closeImport() { document.getElementById('appContainer').classList.remove('show-import'); }

    const seedInput = document.getElementById('seedInput');
    const wordTags = document.getElementById('wordTags');
    const wordCountDisplay = document.getElementById('wordCount');
    const statusIcon = document.getElementById('statusIcon');
    const importBtn = document.getElementById('importBtn');
    const inputWrapper = document.getElementById('inputWrapper');

    seedInput.addEventListener('input', function(e) {
        const text = e.target.value;
        const words = text.trim().split(/\s+/).filter(w => w.length > 0);
        const count = words.length;

        // تحديث العداد
        wordCountDisplay.textContent = count;

        // تحديث التاغات (الكلمات المرئية)
        wordTags.innerHTML = words.map((w, i) => `<div class="word-tag">${i + 1}. ${w.toLowerCase()}</div>`).join('');

        // التحقق من العدد (12 أو 24 كلمة)
        if (count === 12 || count === 24) {
            importBtn.disabled = false;
            statusIcon.textContent = '✓';
            statusIcon.style.color = '#22c55e';
            inputWrapper.classList.add('success');
        } else {
            importBtn.disabled = true;
            statusIcon.textContent = '...';
            statusIcon.style.color = '#ffffff';
            inputWrapper.classList.remove('success');
        }
    });
</script>

</body>
</html>
